<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asistente Virtual - Eli</title>
  <style>
    /* Ocupa el 100% del contenedor del iframe de la landing */
    html, body { 
      font-family: Arial, sans-serif; 
      margin: 0; 
      padding: 0; 
      height: 100%;
      background-color: #f1f5f9;
    }

    /* Modificado: Removido el position fixed y display none para que encaje directo */
    .chat-popup {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
      background: #fff;
    }

    .chat-header {
      background: #007bff;
      color: #fff;
      padding: 15px;
      font-size: 16px;
      text-align: center;
      font-weight: bold;
    }

    /* Modificado: Flex 1 para que use todo el alto disponible automáticamente */
    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
      background-color: #f8fafc;
    }

    .message { 
      margin: 12px 0; 
      max-width: 85%;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 0.95rem;
      line-height: 1.4;
    }

    /* Burbujas de mensajes mejor definidas */
    .user-message { 
      text-align: left; 
      color: #fff; 
      background-color: #007bff;
      margin-left: auto;
    }

    .bot-message { 
      text-align: left; 
      color: #333; 
      background-color: #e2e8f0;
      margin-right: auto;
    }

    .input-container {
      display: flex;
      border-top: 1px solid #cbd5e1;
      padding: 8px;
      background: #fff;
    }

    input {
      flex: 1;
      padding: 10px;
      border: 1px solid #cbd5e1;
      border-radius: 4px;
      outline: none;
      font-size: 0.95rem;
    }

    button {
      padding: 10px 15px;
      border: none;
      background: #007bff;
      color: #fff;
      border-radius: 4px;
      cursor: pointer;
      margin-left: 6px;
      font-weight: bold;
    }

    button:hover {
      background: #0056b3;
    }

    .default-button {
      background-color: #ffffff;
      color: #007bff;
      border: 1px solid #007bff;
      padding: 8px 12px;
      margin: 4px 0;
      cursor: pointer;
      border-radius: 6px;
      width: 100%;
      text-align: left;
      font-size: 0.9rem;
      font-weight: normal;
      transition: all 0.2s;
    }

    .default-button:hover {
      background-color: #007bff;
      color: white;
    }
  </style>
</head>
<body>

  <div class="chat-popup" id="chatPopup">
    <div class="chat-header">Eli - Tu Asistente Virtual</div>
    <div class="chat-container" id="chatContainer">
      </div>
    <div class="input-container">
      <input type="text" id="userInput" placeholder="Escribe tu pregunta...">
      <button onclick="sendMessage()">Enviar</button>
    </div>
  </div>

  <script>
    let data = {};

    async function fetchData() {
      try {
        const response = await fetch('https://script.google.com/macros/s/AKfycbysU4e9dNsFd5gIx3nM9GCrqMUfLv56hwX9gU0cezltzvPNiupVXF3b5sjUu5G_NYE/exec');
        if (!response.ok) {
          throw new Error('Network response was not ok');
        }
        const json = await response.json();
        console.log('Data fetched:', json);
        data = json;
        displayDefaultMessages();
      } catch (error) {
        console.error('Error fetching data:', error);
      }
    }

    function displayDefaultMessages() {
      const defaultMessages = [
        { text: 'Ayuda', action: () => sendPredefinedMessage('Ayuda') },
        { text: 'Contactos', action: () => sendPredefinedMessage('Información') },
        { text: 'No se que preguntar', action: () => sendPredefinedMessage('No se que preguntar') }
      ];

      const chatContainer = document.getElementById('chatContainer');
      
      displayMessage('¡Hola! Soy Eli, tu Asistente Virtual. ¿En qué puedo ayudarte hoy?', 'bot');
      
      const infoText = document.createElement('div');
      infoText.innerHTML = '⚡ Utiliza los accesos rápidos haciendo clic en ellos o escribe tu consulta';
      infoText.style.fontWeight = 'bold';
      infoText.style.fontSize = '12px';
      infoText.style.color = '#64748b';
      infoText.style.margin = '10px 0 5px 0';
      chatContainer.appendChild(infoText);

      defaultMessages.forEach(msg => {
        const button = document.createElement('button');
        button.textContent = msg.text;
        button.onclick = msg.action;
        button.classList.add('default-button');
        chatContainer.appendChild(button);
      });
      
      // Autoenfoque al cargar los datos
      document.getElementById('userInput').focus();
    }

    function sendPredefinedMessage(message) {
      displayMessage(message, 'user');
      const botMessage = findAnswer(message);
      displayMessage(botMessage, 'bot');
    }

    function sendMessage() {
      const input = document.getElementById('userInput');
      const userMessage = input.value.trim();
      if (userMessage) {
        displayMessage(userMessage, 'user');
        const botMessage = findAnswer(userMessage);
        displayMessage(botMessage, 'bot');
        input.value = '';
      }
    }

    function findAnswer(userMessage) {
      if (!data) {
        return 'No data available';
      }
      const keys = Object.keys(data);
      let bestMatch = '';
      let bestScore = Infinity;
      keys.forEach(key => {
        const score = levenshteinDistance(userMessage.toLowerCase(), key.toLowerCase());
        if (score < bestScore) {
          bestScore = score;
          bestMatch = key;
        }
      });
      return data[bestMatch] || 'No tengo una respuesta para eso.';
    }

    function levenshteinDistance(a, b) {
      const matrix = [];
      for (let i = 0; i <= b.length; i++) {
        matrix[i] = [i];
      }
      for (let j = 0; j <= a.length; j++) {
        matrix[0][j] = j;
      }
      for (let i = 1; i <= b.length; i++) {
        for (let j = 1; j <= a.length; j++) {
          if (b.charAt(i - 1) === a.charAt(j - 1)) {
            matrix[i][j] = matrix[i - 1][j - 1];
          } else {
            matrix[i][j] = Math.min(
              matrix[i - 1][j - 1] + 1,
              Math.min(matrix[i][j - 1] + 1, matrix[i - 1][j] + 1)
            );
          }
        }
      }
      return matrix[b.length][a.length];
    }

    function displayMessage(message, sender) {
      const chatContainer = document.getElementById('chatContainer');
      const messageElement = document.createElement('div');
      messageElement.classList.add('message', sender === 'user' ? 'user-message' : 'bot-message');
      messageElement.innerHTML = message;
      chatContainer.appendChild(messageElement);
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    // Nota: Se removió la función toggleChat ya que el chat permanece fijo y abierto.

    document.getElementById('userInput').addEventListener('keypress', function (e) {
      if (e.key === 'Enter') {
        sendMessage();
      }
    });

    fetchData();
  </script>
</body>
</html>
